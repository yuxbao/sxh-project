version: '3.8'

services:
  sxh:
    build: .
    container_name: sxh
    restart: always
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      # 连接宿主机 MySQL
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/sxh?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Baoyu273511a
      # 连接宿主机 Redis
      - SPRING_REDIS_HOST=host.docker.internal
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=273511
      - SPRING_DATA_REDIS_HOST=host.docker.internal
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=273511
      # 连接宿主机 RabbitMQ
      - SPRING_RABBITMQ_HOST=host.docker.internal
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
      - SPRING_RABBITMQ_VIRTUAL_HOST=/sxh
    extra_hosts:
      - "host.docker.internal:host-gateway"
